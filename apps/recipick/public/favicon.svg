  <path d="M16 8.5 Q17.5 6.5 16 4.5" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>
  <path d="M21 8.5 Q22.5 6.5 21 4.5" stroke="#ffffff" stroke-width="1.5" fill="none" stroke-linecap="round"/>

  <!-- Pot lid -->
